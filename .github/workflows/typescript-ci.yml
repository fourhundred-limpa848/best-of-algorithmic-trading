name: typescript-ci

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "projects.yaml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/typescript-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "projects.yaml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/typescript-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run check
